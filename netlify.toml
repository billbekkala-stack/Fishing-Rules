# Netlify config for Fishing Rules PWA
# Uses build:web so sw.js is copied to dist for offline support

[build]
  command = "npm run build:web"
  publish = "dist"

# SPA: serve index.html for all routes so client-side routing works
# (fixes 404 when reloading on /explore or other tabs)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
